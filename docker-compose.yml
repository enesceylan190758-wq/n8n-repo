# Nefalix n8n stack — n8n + n8n-mcp (https://github.com/czlonkowski/n8n-mcp)
# Local development. Production chatbot: enkahealthisterr.app.n8n.cloud

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: nefalix-n8n
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
      - GENERIC_TIMEZONE=Europe/Istanbul
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-medident-pilot}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY:-}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-project-860dace6-d98e-44e1-994}
      - GCP_REGION=${GCP_REGION:-europe-west1}
      - VERTEX_GEMINI_MODEL=${VERTEX_GEMINI_MODEL:-gemini-1.5-flash}
      - GCP_ACCESS_TOKEN=${GCP_ACCESS_TOKEN:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - CLINIC_MANAGER_WHATSAPP=${CLINIC_MANAGER_WHATSAPP:-905491190819}
      - ESTESOFT_API_USERNAME=${ESTESOFT_API_USERNAME:-}
      - ESTESOFT_API_PASSWORD=${ESTESOFT_API_PASSWORD:-}
      - ESTESOFT_API_KEY=${ESTESOFT_API_KEY:-}
      - ESTESOFT_STELLA_API_BASE=${ESTESOFT_STELLA_API_BASE:-https://medidentistanbul.stellamedi.com}
      - WHATSAPP_SEND_ENABLED=${WHATSAPP_SEND_ENABLED:-true}
      - WHATSAPP_MIN_INTERVAL_SEC=${WHATSAPP_MIN_INTERVAL_SEC:-45}
      - WHATSAPP_MAX_PER_HOUR=${WHATSAPP_MAX_PER_HOUR:-20}
      - WHATSAPP_MAX_BURST_5MIN=${WHATSAPP_MAX_BURST_5MIN:-3}
      - ESTESOFT_POLL_MAX_PER_RUN=${ESTESOFT_POLL_MAX_PER_RUN:-1}
      - ESTESOFT_POLL_HOURS=${ESTESOFT_POLL_HOURS:-24}
      - SIKAYETVAR_USE_JINA=${SIKAYETVAR_USE_JINA:-1}
      - SIKAYETVAR_REQUEST_DELAY_SEC=${SIKAYETVAR_REQUEST_DELAY_SEC:-2}
      - NEFALIX_INTERNAL_KEY=${NEFALIX_INTERNAL_KEY:-}
      - N8N_EXPRESSIONS_ALLOWED_ENV_VARS=EVOLUTION_API_URL,EVOLUTION_API_KEY,EVOLUTION_INSTANCE,GOOGLE_PLACES_API_KEY,GCP_PROJECT_ID,GCP_REGION,VERTEX_GEMINI_MODEL,GCP_ACCESS_TOKEN,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,CLINIC_MANAGER_WHATSAPP,ESTESOFT_API_USERNAME,ESTESOFT_API_PASSWORD,ESTESOFT_API_KEY,ESTESOFT_STELLA_API_BASE,WEBHOOK_URL,N8N_WEBHOOK_URL,WHATSAPP_SEND_ENABLED,WHATSAPP_MIN_INTERVAL_SEC,WHATSAPP_MAX_PER_HOUR,WHATSAPP_MAX_BURST_5MIN,ESTESOFT_POLL_MAX_PER_RUN,ESTESOFT_POLL_HOURS,SIKAYETVAR_USE_JINA,SIKAYETVAR_REQUEST_DELAY_SEC,NEFALIX_INTERNAL_KEY
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - nefalix-net
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: nefalix-n8n-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - N8N_MODE=true
      - MCP_MODE=http
      - PORT=3000
      - N8N_API_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY:-}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:?Set MCP_AUTH_TOKEN in .env (min 32 chars)}
      - AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - WEBHOOK_SECURITY_MODE=moderate
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - nefalix-net
    depends_on:
      n8n:
        condition: service_healthy

volumes:
  n8n_data:

networks:
  nefalix-net:
    driver: bridge
