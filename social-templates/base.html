<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post {{POST_NUMBER}} — NefalixAI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Cormorant+Garamond:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #0A0F1C; font-family: 'Montserrat', sans-serif;
    display: flex; align-items: stretch;
  }
  .post {
    width: 1080px; height: 1080px; position: relative;
    background: linear-gradient(145deg, #0A0F1C 0%, #0D1B2A 50%, #0A0F1C 100%);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 64px 72px; overflow: hidden;
  }
  .post::before {
    content: ''; position: absolute; top: -180px; right: -180px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .post::after {
    content: ''; position: absolute; bottom: -120px; left: -120px;
    width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, rgba(30,60,100,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .top-line {
    width: 100%; height: 1.5px;
    background: linear-gradient(90deg, transparent, #C9A96E 30%, #C9A96E 70%, transparent);
    margin-bottom: 40px;
  }
  .header { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 10; }
  .logo-wordmark {
    font-size: 18px; font-weight: 800; letter-spacing: 6px;
    color: #ffffff; text-transform: uppercase;
  }
  .logo-wordmark span { color: #C9A96E; }
  .logo-sub {
    font-size: 10px; letter-spacing: 3px; color: rgba(201,169,110,0.7);
    text-transform: uppercase; font-weight: 400; margin-top: 4px;
  }
  .logo-circle {
    width: 52px; height: 52px; border: 1.5px solid #C9A96E; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #C9A96E; font-weight: 700;
  }
  .body {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    position: relative; z-index: 10; padding: 40px 0;
  }
  .eyebrow {
    font-size: 11px; letter-spacing: 4px; color: #C9A96E;
    text-transform: uppercase; font-weight: 600; margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .eyebrow::before { content: ''; width: 28px; height: 1.5px; background: #C9A96E; }
  h1 {
    font-family: 'Cormorant Garamond', serif; font-size: 68px; font-weight: 600;
    line-height: 1.15; color: #ffffff; margin-bottom: 24px; max-width: 820px;
  }
  h1 em { font-style: italic; color: #C9A96E; }
  .subtitle {
    font-size: 17px; font-weight: 300; color: rgba(255,255,255,0.65);
    line-height: 1.6; max-width: 680px; margin-bottom: 48px;
  }
  .badges { display: flex; gap: 14px; flex-wrap: wrap; }
  .badge {
    padding: 10px 22px; border: 1px solid rgba(201,169,110,0.3); border-radius: 40px;
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85);
    background: rgba(201,169,110,0.06); letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #C9A96E; }
  .deco-line {
    position: absolute; right: 80px; top: 50%; transform: translateY(-50%);
    width: 1px; height: 280px;
    background: linear-gradient(180deg, transparent, rgba(201,169,110,0.25) 30%, rgba(201,169,110,0.25) 70%, transparent);
  }
  .bottom-line {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3) 30%, rgba(201,169,110,0.3) 70%, transparent);
    margin-bottom: 28px;
  }
  .footer { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 10; }
  .contact-mail { font-size: 14px; color: #C9A96E; font-weight: 500; }
  .contact-web { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 1px; margin-top: 4px; }
  .footer-tag { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
</style>
</head>
<body>
<div class="post">
  <div class="deco-line"></div>
  <div>
    <div class="top-line"></div>
    <div class="header">
      <div>
        <div class="logo-wordmark">Nefalix<span>AI</span></div>
        <div class="logo-sub">Hasta Deneyimi & İtibar</div>
      </div>
      <div class="logo-circle">N</div>
    </div>
  </div>
  <div class="body">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1>{{HEADLINE_HTML}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <div class="badges">{{BADGES_HTML}}</div>
  </div>
  <div>
    <div class="bottom-line"></div>
    <div class="footer">
      <div>
        <div class="contact-mail">nefalixai@gmail.com</div>
        <div class="contact-web">nefalixai.com</div>
      </div>
      <div class="footer-tag">Post {{POST_NUMBER}} / 10</div>
    </div>
  </div>
</div>
</body>
</html>
