name: Nefalix CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Supabase migration ──────────────────────────────────────────────────
  migrate:
    name: Supabase DB Push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── 2. FastAPI lint + test ─────────────────────────────────────────────────
  test-api:
    name: FastAPI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ── 3. FastAPI deploy → Fly.io ─────────────────────────────────────────────
  deploy-api:
    name: Deploy FastAPI → Fly.io
    runs-on: ubuntu-latest
    needs: [migrate, test-api]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --app nefalix-api --config fastapi-mcp/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── 4. Next.js deploy → Vercel (otomatik, bu job sadece bildirim amaçlı) ──
  notify-vercel:
    name: Vercel Deploy (otomatik)
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify
        run: echo "Vercel, GitHub entegrasyonu üzerinden otomatik deploy eder."
